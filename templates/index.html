<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AppRent - Catalogue</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-600 p-4 text-white flex justify-between shadow-lg">
        <h1 class="text-xl font-bold">🚀 AppRent</h1>
        <a href="admin.html" class="bg-blue-800 px-3 py-1 rounded text-sm">Espace Admin</a>
    </nav>

    <main class="p-8">
        <h2 class="text-3xl font-bold mb-8 text-center text-gray-800">Louer une Application</h2>

        <div id="app-container" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <p class="text-gray-500">Chargement des applications...</p>
        </div>
    </main>

    <script>
        // Fonction pour récupérer les apps depuis le serveur Python
        async function loadApps() {
            try {
                const response = await fetch('http://127.0.0.1:5000/api/apps');
                const apps = await response.json();
                const container = document.getElementById('app-container');
                container.innerHTML = ''; // On vide le message de chargement

                apps.forEach(app => {
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-xl shadow-md hover:shadow-xl transition border-l-4 border-blue-500">
                            <h3 class="text-xl font-bold text-gray-800">${app.name}</h3>
                            <p class="text-gray-600 my-3">${app.desc}</p>
                            <div class="flex justify-between items-center mt-4">
                                <span class="text-blue-600 font-bold text-lg">${app.price}€ / mois</span>
                                <button onclick="window.location.href='${app.url}'" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                                    Louer
                                </button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Erreur:", error);
                document.getElementById('app-container').innerHTML = "Impossible de charger les apps. Lancez le serveur Python !";
            }
        }

        loadApps();
    </script>
</body>
</html>
