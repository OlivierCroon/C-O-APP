<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppRent - Connexion / Inscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <!-- Titre dynamique -->
        <h2 id="form-title" class="text-2xl font-bold text-center mb-6 text-gray-800">Connexion</h2>

        <form id="authForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Adresse Email</label>
                <input type="email" id="email" placeholder="votre@email.com" class="w-full p-3 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full p-3 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition duration-200">
                Se connecter
            </button>
        </form>

        <p class="mt-4 text-center text-sm text-gray-600">
            <span id="toggle-text">Pas encore de compte ?</span>
            <button id="toggle-btn" class="text-blue-600 font-bold ml-1 underline">S'inscrire</button>
        </p>

        <div class="mt-6 border-t pt-4">
            <a href="/" class="block text-center text-gray-500 text-xs hover:text-gray-700 transition">
                ← Retour au catalogue
            </a>
        </div>
    </div>

    <script>
        let isLogin = true;
        const form = document.getElementById('authForm');
        const title = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-btn');
        const toggleText = document.getElementById('toggle-text');

        // Bascule entre le mode Connexion et Inscription
        toggleBtn.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            title.innerText = isLogin ? "Connexion" : "Inscription";
            submitBtn.innerText = isLogin ? "Se connecter" : "Créer mon compte";
            toggleText.innerText = isLogin ? "Pas encore de compte ?" : "Déjà un compte ?";
            toggleBtn.innerText = isLogin ? "S'inscrire" : "Se connecter";
        });

        // Gestion de la soumission du formulaire
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const endpoint = isLogin ? '/api/login' : '/api/register';
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    if (isLogin) {
                        // Redirection vers l'accueil après connexion réussie
                        window.location.href = '/';
                    } else {
                        // Après inscription, on repasse en mode connexion
                        alert("Compte créé avec succès ! Vous pouvez maintenant vous connecter.");
                        isLogin = true;
                        title.innerText = "Connexion";
                        submitBtn.innerText = "Se connecter";
                        toggleText.innerText = "Pas encore de compte ?";
                        toggleBtn.innerText = "S'inscrire";
                        form.reset();
                    }
                } else {
                    // Affichage de l'erreur renvoyée par le backend Flask
                    alert("Erreur : " + result.error);
                }
            } catch (error) {
                console.error("Erreur réseau :", error);
                alert("Impossible de contacter le serveur. Vérifiez que main.py est bien lancé sur le port 5020.");
            }
        });
    </script>
</body>
</html>
