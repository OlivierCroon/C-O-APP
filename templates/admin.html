<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin - Ajouter une App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div class="max-w-xl mx-auto mt-12 bg-white p-8 rounded-2xl shadow-xl">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">➕ Ajouter au catalogue</h2>

        <form id="addForm" class="space-y-4">
            <input type="text" id="name" placeholder="Nom de l'app" class="w-full p-3 border rounded-lg" required>
            <textarea id="desc" placeholder="Description courte" class="w-full p-3 border rounded-lg" required></textarea>
            <div class="flex gap-4">
                <input type="number" id="price" placeholder="Prix (€)" class="w-1/2 p-3 border rounded-lg" step="0.01" required>
                <!-- Changé en type="text" pour éviter le blocage strict du navigateur -->
                <input type="text" id="url" placeholder="Lien (ex: https://...)" class="w-1/2 p-3 border rounded-lg" required>
            </div>
            <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition">
                Enregistrer sur le serveur
            </button>
        </form>
        <div class="flex justify-between mt-6">
            <a href="/" class="text-blue-600 underline text-sm">Retour au catalogue</a>
        </div>
    </div>

    <script>
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Empêche le rechargement de la page

            const appData = {
                name: document.getElementById('name').value,
                desc: document.getElementById('desc').value,
                price: document.getElementById('price').value,
                url: document.getElementById('url').value
            };

            try {
                const response = await fetch('/api/apps', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(appData)
                });

                if (response.ok) {
                    alert("✅ Application ajoutée au catalogue !");
                    document.getElementById('addForm').reset();
                } else {
                    const error = await response.json();
                    alert("❌ Erreur : " + JSON.stringify(error));
                }
            } catch (err) {
                alert("❌ Impossible de se connecter au serveur. Regardez la console (F12).");
                console.error(err);
            }
        });
    </script>
</body>
</html>
